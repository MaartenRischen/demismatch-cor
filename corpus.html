  <script id="corpus" type="application/json">[{"id":30,"title":"On the Origin of Species by Means of Natural Selection","authors":"Charles Darwin","year":1859,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds P1 - Darwin establishes the survival-and-reproduction loss function that P1 formalizes. Primary extractions carry Darwin's verbatim statements from Chapters III (Struggle for Existence) and IV (Natural Selection + Sexual Selection)."},{"id":15,"title":"The Study of Instinct","authors":"Tinbergen N","year":1951,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA4 - Tinbergen's founding articulation of sign stimuli, innate releasing mechanisms, and supernormal stimuli. Extractions carry Tinbergen's verbatim statements from Chapter III of the proxy-hijacking logic that DA4 formalizes."},{"id":97,"title":"The Nature of the Child's Tie to His Mother","authors":"Bowlby J","year":1958,"work_type":"paper","importance":"pillar","doi":null,"pmid":"13610508","phys":false,"summary":null,"why":"Broke with Freudian drive theory. Proposed attachment as primary via 5 instinctual responses. Grounds M3, DA2."},{"id":81,"title":"The Nature of Love","authors":"Harlow HF","year":1958,"work_type":"paper","importance":"pillar","doi":"10.1037/h0047884","pmid":null,"phys":false,"summary":null,"why":"Wire vs cloth mother: contact comfort primary. Grounds R1, M3, DA2."},{"id":16,"title":"The genetical evolution of social behaviour. I","authors":"Hamilton WD","year":1964,"work_type":"paper","importance":"pillar","doi":"10.1016/0022-5193(64)90038-4","pmid":"5875341","phys":false,"summary":null,"why":"Grounds P1 - Hamilton's formal derivation of inclusive fitness and Hamilton's rule, extending Darwin's loss function to kin-selected altruism. Directly forces P1."},{"id":5,"title":"Attachment and Loss, Volume 1: Attachment","authors":"John Bowlby","year":1969,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA7 and M3 - Bowlby's founding articulation of attachment as a primary evolved motivational system and the environment of evolutionary adaptedness (EEA) concept itself, which P3 and DA7 both rest on."},{"id":66,"title":"The Evolution of Reciprocal Altruism","authors":"Trivers RL","year":1971,"work_type":"paper","importance":"pillar","doi":"10.1086/406755","pmid":null,"phys":false,"summary":null,"why":"Foundational paper establishing reciprocal altruism as mechanism for cooperation among non-relatives. Grounds M11 and extends P1 beyond kin selection."},{"id":98,"title":"Attachment and Loss, Volume 2: Separation: Anxiety and Anger","authors":"Bowlby J","year":1973,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Protest-despair-detachment sequence. Ethological theory of fear. Anxious attachment. Agoraphobia as attachment disorder. Grounds M3, M1, DA1."},{"id":87,"title":"Patterns of Attachment: A Psychological Study of the Strange Situation","authors":"Ainsworth MDS, Blehar MC, Waters E, Wall S","year":1978,"work_type":"book","importance":"pillar","doi":"10.4324/9781315802428","pmid":null,"phys":false,"summary":null,"why":"THE Strange Situation. A/B/C classification. Sensitivity hypothesis. Grounds M3, DA7."},{"id":75,"title":"Toward a general psychobiological theory of emotions","authors":"Panksepp J","year":1982,"work_type":"paper","importance":"pillar","doi":"10.1017/S0140525X00012759","pmid":null,"phys":false,"summary":null,"why":"THE theoretical paper laying out initial 4 emotional command circuits. Foundation for DA8, C4."},{"id":76,"title":"The psychobiology of play: Theoretical and methodological perspectives","authors":"Panksepp J, Siviy S, Normansell L","year":1984,"work_type":"paper","importance":"pillar","doi":"10.1016/0149-7634(84)90005-8","pmid":"6392950","phys":false,"summary":null,"why":"Primary evidence for PLAY as distinct emotional system with dedicated neural circuitry. Grounds M4."},{"id":19,"title":"Paleolithic Nutrition: A Consideration of Its Nature and Current Implications","authors":"Eaton SB, Konner M","year":1985,"work_type":"paper","importance":"pillar","doi":"10.1056/NEJM198501313120505","pmid":"2981409","phys":false,"summary":null,"why":"Grounds P3 - Eaton & Konner's discordance hypothesis in NEJM is the founding statement of the ancestral-vs-modern environment gap and the template all subsequent mismatch analyses follow."},{"id":100,"title":"The logic of social exchange: Has natural selection shaped how humans reason?","authors":"Cosmides L","year":1989,"work_type":"paper","importance":"pillar","doi":"10.1016/0010-0277(89)90023-1","pmid":"2743748","phys":false,"summary":null,"why":"Wason selection task cheater detection experiments. Primary evidence for P2 domain-specificity. 75% correct on social contracts vs 5-30% abstract."},{"id":99,"title":"The Psychological Foundations of Culture","authors":"Tooby J, Cosmides L","year":1992,"work_type":"chapter","importance":"pillar","doi":"10.1093/oso/9780195060232.003.0002","pmid":null,"phys":false,"summary":null,"why":"THE theoretical paper formalizing EEA, domain-specificity, SSSM critique. Foundation for P2 and P3. Chapter in The Adapted Mind (#1)."},{"id":68,"title":"Neocortex size as a constraint on group size in primates","authors":"Dunbar RIM","year":1992,"work_type":"paper","importance":"pillar","doi":"10.1016/0047-2484(92)90081-J","pmid":null,"phys":false,"summary":null,"why":"THE foundational paper establishing the social brain hypothesis and deriving Dunbar's number (~148) from neocortex ratio regression across 38 primate genera. Grounds DA2, P2, M3."},{"id":1,"title":"The Adapted Mind: Evolutionary Psychology and the Generation of Culture","authors":"Jerome H. Barkow, Leda Cosmides, John Tooby (editors)","year":1992,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds P2 and DA6 - Tooby & Cosmides' founding statement of evolutionary psychology's design-principle framework: evolved mechanisms are content-specific, domain-specialized adaptations to Pleistocene adaptive problems, with explicit EEA-vs-modern-environment discordance."},{"id":29,"title":"Stress and the Individual: Mechanisms Leading to Disease","authors":"McEwen BS, Stellar E","year":1993,"work_type":"paper","importance":"pillar","doi":null,"pmid":"8379800","phys":false,"summary":null,"why":"Grounds DC1 - McEwen & Stellar's original allostasis/allostatic-load formulation: the organism maintains stability through dynamic adjustment, and the cumulative cost of that adjustment under chronic challenge is the pathway to disease."},{"id":95,"title":"Evolution and the origins of disease","authors":"Nesse RM, Williams GC","year":1998,"work_type":"paper","importance":"pillar","doi":"10.1038/scientificamerican1198-86","pmid":"9796548","phys":false,"summary":null,"why":"Foundational evolutionary medicine. Five categories of disease vulnerability. Defenses as adaptations. Grounds P3, DA1."},{"id":69,"title":"The Social Brain Hypothesis","authors":"Dunbar RIM","year":1998,"work_type":"paper","importance":"pillar","doi":"10.1002/(SICI)1520-6505(1998)6:5\u003c178::AID-EVAN5>3.0.CO;2-8","pmid":null,"phys":false,"summary":null,"why":"Formal statement of the social brain hypothesis with stepwise regression confirming neocortex ratio as best predictor. Introduces hierarchical social layers (5/12/35/150/500/2000) and ethnographic validation. Grounds DA2, P2, M3."},{"id":26,"title":"Relationship of Childhood Abuse and Household Dysfunction to Many of the Leading Causes of Death in Adults","authors":"Felitti VJ, Anda RF, Nordenberg D, et al.","year":1998,"work_type":"paper","importance":"pillar","doi":"10.1016/S0749-3797(98)00017-8","pmid":"9635069","phys":false,"summary":null,"why":"Grounds DA3 - Felitti et al. ACE Study establishes the dose-response relationship between adverse childhood experience categories and adult health outcomes across fundamentally different domains, empirical anchor for recurrent coupling and cascading."},{"id":22,"title":"What is the role of dopamine in reward: hedonic impact, reward learning, or incentive salience?","authors":"Berridge KC, Robinson TE","year":1998,"work_type":"review","importance":"pillar","doi":"10.1016/s0165-0173(98)00019-8","pmid":"9858756","phys":false,"summary":null,"why":"Grounds DA4 - Berridge & Robinson's founding statement of the wanting/liking dissociation and incentive salience. The mechanism by which proxies can hijack motivational systems independent of hedonic satisfaction."},{"id":28,"title":"Protective and damaging effects of stress mediators","authors":"McEwen BS","year":1998,"work_type":"review","importance":"pillar","doi":"10.1056/NEJM199801153380307","pmid":"9428819","phys":false,"summary":null,"why":"Grounds DC1 and DA7 - McEwen's NEJM review: stress mediators are protective short-term via allostasis but produce cumulative allostatic load when chronically elevated. The founding clinical statement of allostatic load."},{"id":4,"title":"Affective Neuroscience: The Foundations of Human and Animal Emotions","authors":"Jaak Panksepp","year":1998,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA8 - the original Panksepp textbook establishing the subcortical affective systems methodology that Archaeology of Mind later popularized. Precedes and grounds M1-M4 and M14."},{"id":60,"title":"Mother Nature: A History of Mothers, Infants, and Natural Selection","authors":"Hrdy, Sarah Blaffer","year":1999,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Load-bears M9 Care/Alloparenting (primary target, currently 10 rows after Bullmore bump). Mother Nature is Hrdy s comprehensive synthesis of cooperative breeding, maternal ambivalence, life-history variation in maternal investment, and the evolutionary ecology of mother-infant relationships across primates and humans. It preceded her 2009 Mothers and Others by a decade and covers substantially different material. Also supports M14 Reproductive Motivation (maternal/sexual overlap), P1 Inclusive Fitness (kin-selection maternal-investment tradeoffs), and DA7 Developmental Calibration (infant-rearing variation shaping adult architecture)."},{"id":38,"title":"Stability, Precision, and Near-24-Hour Period of the Human Circadian Pacemaker","authors":"Charles A. Czeisler, Jeanne F. Duffy, Theresa L. Shanahan, Emery N. Brown, Jude F. Mitchell, David W. Rimmer, Joseph M. Ronda, Edward J. Silva, James S. Allan, Jonathan S. Emens, Derk-Jan Dijk, Richard E. Kronauer","year":1999,"work_type":"paper","importance":"pillar","doi":"10.1126/science.284.5423.2177","pmid":null,"phys":false,"summary":null,"why":"Grounds M7 - Czeisler et al.'s forced-desynchrony protocol establishing human intrinsic circadian period at ~24.18 hours, not the previously-believed 25 hours. Foundational measurement for M7."},{"id":9,"title":"Hierarchy in the Forest: The Evolution of Egalitarian Behavior","authors":"Christopher Boehm","year":1999,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M11 and DA6 - Boehm's reverse-dominance hypothesis: egalitarian hunter-gatherer bands maintain equality through active coalitional suppression of upstarts, demonstrating that humans carry both dominance and anti-dominance motives as partially competing programs."},{"id":84,"title":"Emotion Circuits in the Brain","authors":"LeDoux JE","year":2000,"work_type":"review","importance":"pillar","doi":"10.1146/annurev.neuro.23.1.155","pmid":"10845062","phys":false,"summary":null,"why":"THE amygdala fear conditioning review. Low/high road. Grounds M1, C10, DA8."},{"id":53,"title":"Is Depression an Adaptation?","authors":"Nesse, Randolph M.","year":2000,"work_type":"paper","importance":"pillar","doi":"10.1001/archpsyc.57.1.14","pmid":null,"phys":true,"summary":null,"why":"Grounds DA1 - Nesse's foundational case for depression subtypes as evolved defensive signals (social defeat, pursuit of unreachable goals, kin loss, incapacitation when physically ill). Predates Good Reasons for Bad Feelings (2019) by 19 years and is THE primary journal-article statement of the defensive-signal thesis applied to depression. Published in Archives of General Psychiatry 57:14-20."},{"id":21,"title":"Error Management Theory: A New Perspective on Biases in Cross-Sex Mind Reading","authors":"Haselton MG, Buss DM","year":2000,"work_type":"paper","importance":"pillar","doi":"10.1037/0022-3514.78.1.81","pmid":"10653507","phys":false,"summary":null,"why":"Grounds DA5 - Haselton & Buss's founding statement of Error Management Theory: asymmetric error costs produce predictable domain-specific biases."},{"id":24,"title":"Altruistic Punishment in Humans","authors":"Fehr E, Gächter S","year":2002,"work_type":"paper","importance":"pillar","doi":"10.1038/415137a","pmid":"11805825","phys":false,"summary":null,"why":"Grounds M11 - Fehr & Gächter's experimental demonstration of altruistic punishment: humans pay personal costs to punish free-riders with no kin, reciprocity, or reputation benefits. Empirical anchor for the norm-enforcement component of cooperation."},{"id":90,"title":"A Pacific Culture among Wild Baboons: Its Emergence and Transmission","authors":"Sapolsky RM, Share LJ","year":2004,"work_type":"paper","importance":"pillar","doi":"10.1371/journal.pbio.0020106","pmid":"15094808","phys":false,"summary":null,"why":"Forest Troop paper: aggressive males die, culture shifts to low-stress, persists across generations. ED1 source. Grounds M5, M3, DA2."},{"id":42,"title":"Epigenetic programming by maternal behavior","authors":"Weaver ICG, Cervoni N, Champagne FA, D'Alessio AC, Sharma S, Seckl JR, Dymov S, Szyf M, Meaney MJ","year":2004,"work_type":"paper","importance":"pillar","doi":null,"pmid":"15220929","phys":false,"summary":null,"why":"Grounds DA7 and M3 - Weaver/Meaney's demonstration that maternal care programs glucocorticoid-receptor gene expression via epigenetic methylation, and that cross-fostering reverses the programming - direct evidence for developmental calibration with environmental reversibility."},{"id":94,"title":"Natural selection and the regulation of defenses: A signal detection analysis of the smoke detector principle","authors":"Nesse RM","year":2005,"work_type":"paper","importance":"pillar","doi":"10.1016/j.evolhumbehav.2004.08.002","pmid":null,"phys":false,"summary":null,"why":"THE smoke detector principle paper. Signal detection analysis: cost asymmetry makes false alarms optimal. Grounds DA5, C8."},{"id":91,"title":"The Influence of Social Hierarchy on Primate Health","authors":"Sapolsky RM","year":2005,"work_type":"paper","importance":"pillar","doi":"10.1126/science.1106477","pmid":"15860617","phys":false,"summary":null,"why":"Rank→cortisol→health. Context-dependent: low rank stressful in despotic hierarchies. Grounds M5, DC1."},{"id":78,"title":"Affective consciousness: Core emotional feelings in animals and humans","authors":"Panksepp J","year":2005,"work_type":"paper","importance":"pillar","doi":"10.1016/j.concog.2004.10.004","pmid":"15766890","phys":false,"summary":null,"why":"Consciousness argument for subcortical affect. Anti-constructivist argument for BT1/Barrett debate. Grounds DA8, C4."},{"id":7,"title":"Not by Genes Alone: How Culture Transformed Human Evolution","authors":"Peter J. Richerson and Robert Boyd","year":2005,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds P3 constraint - Richerson & Boyd's formal statement of gene-culture coevolution: culture is itself an adaptation that shapes the expected environment, so 'matched' must include cultural scaffolding, not just ancestral surface form."},{"id":71,"title":"Evolution in the Social Brain","authors":"Dunbar RIM, Shultz S","year":2007,"work_type":"paper","importance":"pillar","doi":"10.1126/science.1145463","pmid":null,"phys":false,"summary":null,"why":"Key Science paper extending social brain to pair-bonding species across 5 vertebrate taxa. Shows primates uniquely generalized pair-bond cognition to group-level bonding. Grounds M3, DA2."},{"id":101,"title":"The Evolutionary Psychology of the Emotions and Their Relationship to Internal Regulatory Variables","authors":"Tooby J, Cosmides L","year":2008,"work_type":"chapter","importance":"pillar","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Emotions as superordinate programs coordinating perception, attention, memory, goals, physiology. Grounds DA6 directly."},{"id":10,"title":"Mothers and Others: The Evolutionary Origins of Mutual Understanding","authors":"Sarah Blaffer Hrdy","year":2009,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M9 and DA2 - Hrdy's cooperative-breeding thesis: human infants evolved under an alloparenting regime where survival depended on eliciting care from multiple caregivers, making social-scaffolding-of-regulation constitutive rather than optional."},{"id":12,"title":"How Many Friends Does One Person Need? Dunbar's Number and Other Evolutionary Quirks","authors":"Robin Dunbar","year":2010,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA2 - Dunbar's consolidated statement of the social-brain hypothesis and the ~150-person cognitive ceiling on coherent face-to-face relationships, providing the parameter value for the social architecture DA2 rests on."},{"id":77,"title":"The basic emotional circuits of mammalian brains: Do animals have affective lives?","authors":"Panksepp J","year":2011,"work_type":"review","importance":"pillar","doi":"10.1016/j.neubiorev.2011.08.003","pmid":"21872619","phys":false,"summary":null,"why":"Late-career synthesis of 30+ years of cross-species subcortical stimulation. Maps all 7 emotional systems. Most important paper for BT1, DA8/C4."},{"id":79,"title":"Why Does Depression Hurt? Ancestral Primary-Process Separation-Distress (PANIC/GRIEF) and Diminished Brain Reward (SEEKING) Processes in the Genesis of Depressive Affect","authors":"Panksepp J, Watt D","year":2011,"work_type":"paper","importance":"pillar","doi":"10.1521/psyc.2011.74.1.5","pmid":"21463165","phys":false,"summary":null,"why":"Links PANIC/GRIEF to depression via two-phase model. Grounds M3 grief mode, DA1, DA3."},{"id":31,"title":"Disgust as an Adaptive System for Disease Avoidance Behaviour","authors":"Curtis V, de Barra M, Aunger R","year":2011,"work_type":"paper","importance":"pillar","doi":"10.1098/rstb.2010.0117","pmid":"21357237","phys":false,"summary":null,"why":"Grounds M12 / DA5 - Curtis et al.'s evolved-disgust-as-disease-avoidance framework. Primary source for treating disgust as a behavioral immune system with smoke-detector calibration and pregnancy-modulated sensitivity."},{"id":52,"title":"Stress and anxiety: Structural plasticity and epigenetic regulation as a consequence of stress","authors":"McEwen, Bruce S.; Eiland, Lisa; Hunter, Richard G.; Miller, Melinda M.","year":2012,"work_type":"review","importance":"pillar","doi":"10.1016/j.neuropharm.2011.07.014","pmid":null,"phys":true,"summary":null,"why":"Grounds DC1, DA1, and DA7 - McEwen et al.'s 2012 review consolidates the structural-plasticity evidence for reversible remodeling of hippocampus, prefrontal cortex, and amygdala under chronic stress. Critical for Cor because it supports the 'much wear reverses with environmental correction' claim in DC1's scope notes and the 'defensive activation vs damage' distinction in DA1: stress-induced structural remodeling is adaptive plasticity, not brain damage, except under sustained overload."},{"id":33,"title":"Addiction by Design: Machine Gambling in Las Vegas","authors":"Schull ND","year":2012,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Grounds DC2 and DA4 - Schüll's ethnography of engineered addiction in machine gambling. Primary source for the 'machine zone' dissociation and the industry's structural dependence on problem gamblers (30-60% of revenue)."},{"id":3,"title":"The Archaeology of Mind: Neuroevolutionary Origins of Human Emotions","authors":"Jaak Panksepp and Lucy Biven","year":2012,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA8 - Panksepp's mature statement of seven conserved subcortical affective-motivational systems (SEEKING, FEAR, RAGE, LUST, CARE, PANIC/GRIEF, PLAY) with cross-species phylogenetic evidence for their priority over cortical processes. Sources for M1, M2, M3, M4, M14."},{"id":64,"title":"The Story of the Human Body: Evolution, Health, and Disease","authors":"Lieberman, Daniel","year":2013,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Lieberman's flagship statement of the evolutionary-mismatch framework preceding Exercised (2021). This is the foundational book-length articulation of mismatch as a diagnostic lens for modern chronic disease, covering the agricultural transition, the industrial transition, and the specific mismatch etiology of obesity, type 2 diabetes, cardiovascular disease, and musculoskeletal disease. Primary pillar for Lieberman's contribution to P3 Systematic Mismatch and M13 Energy Regulation at the book-length evidentiary level. Where Exercised focuses on movement specifically, Story of the Human Body establishes the broader mismatch framework that M13 applies to food, metabolism, and the farming-transition energy cascade."},{"id":65,"title":"Touch","authors":"Field, Tiffany","year":2014,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Tiffany Field's canonical synthesis of the Touch Research Institute program. This is the primary-source book for R1 Touch in the mechanism architecture - Field's summary of touch-deprivation developmental consequences, massage therapy empirical effects (especially premature-infant weight gain and cortisol reduction), touch in adult attachment and stress regulation, and cultural variation in touch frequency. Tagged pillar because Field is the single most influential researcher on touch as a regulatory input and this book is her accessible synthesis of decades of Touch Research Institute work plus the broader comparative literature (Harlow, Jourard, Montagu, Romanian orphanage studies)."},{"id":14,"title":"A Natural History of Human Thinking","authors":"Michael Tomasello","year":2014,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M11 - Tomasello's shared-intentionality hypothesis: human cognition evolved via two transitions into joint and collective intentionality structures that made cooperative problem-solving and cultural institutions possible."},{"id":23,"title":"Social Baseline Theory: the social regulation of risk and effort","authors":"Coan JA, Sbarra DA","year":2015,"work_type":"review","importance":"pillar","doi":"10.1016/j.copsyc.2014.12.021","pmid":"25825706","phys":true,"summary":null,"why":"Grounds DA2 - Coan & Sbarra's Social Baseline Theory: the brain's default expectation is proximity to trusted others, and isolation is the energetically costly deviation rather than the reverse. Extractions carry Coan & Sbarra's verbatim formulation of the social-regulation hypothesis that DA2 rests on."},{"id":17,"title":"Interface Theory of Perception","authors":"Hoffman DD, Singh M, Prakash C","year":2015,"work_type":"paper","importance":"pillar","doi":"10.3758/s13423-015-0890-8","pmid":"26384988","phys":false,"summary":null,"why":"Grounds OF1 - Hoffman, Singh & Prakash's Interface Theory of Perception formalizes the claim that perception is a species-specific fitness interface, not a veridical window on objective reality."},{"id":61,"title":"Constrained Total Energy Expenditure and Metabolic Adaptation to Physical Activity in Adult Humans","authors":"Pontzer, Herman; Durazo-Arvizu, Ramon; Dugas, Lara R.; Plange-Rhule, Jacob; Bovet, Pascal; Forrester, Terrence E.; Lambert, Estelle V.; Cooper, Richard S.; Schoeller, Dale A.; Luke, Amy","year":2016,"work_type":"paper","importance":"pillar","doi":"10.1016/j.cub.2015.12.046","pmid":null,"phys":true,"summary":null,"why":"Grounds M13 Energy Regulation at the primary-source level. This is the foundational multi-population (n=332, five countries) doubly-labeled-water study establishing the constrained total energy expenditure model: TEE plateaus above moderate activity levels rather than rising linearly. The paper is load-bearing for M13's cascade framing and for the evidence that human metabolism is homeostatically buffered against habitual activity variation - exercise alone does not produce linear caloric deficits, because the body adapts to maintain TEE within a narrow range. Tagged as pillar because this is the canonical Current Biology paper that introduced the Constrained TEE model to the literature."},{"id":50,"title":"The Secret of Our Success: How Culture is Driving Human Evolution, Domesticating Our Species, and Making Us Smarter","authors":"Henrich, Joseph","year":2016,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds P3 constraint and P2 - Henrich's formal case that cumulative cultural adaptation IS part of human biology, not separate from it. Cultural transmission is what domain-sensitive evolved cognition produces, not an alternative to it. Complements WEIRDest People 2020 on the specific-culture end by grounding the general cultural-evolution claim, and provides the Franklin Expedition case (the canonical P3 constraint demonstration)."},{"id":13,"title":"Behave: The Biology of Humans at Our Best and Worst","authors":"Robert M. Sapolsky","year":2017,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M5 and DC1 - Sapolsky's synthesis of hierarchy physiology and stress-reactivity data, including the Forest Troop natural experiment (Sapolsky & Share 2004) demonstrating that hierarchy type (not its mere existence) determines pathology, and that environmental correction can shift a baboon troop's cultural style."},{"id":11,"title":"How Emotions Are Made: The Secret Life of the Brain","authors":"Lisa Feldman Barrett","year":2017,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds Bridge Thesis (Panksepp-Barrett resolution) - Barrett's theory of constructed emotion provides the critique of folk emotion categories as natural kinds. In Cor she does not displace Panksepp's subcortical systems but scopes them: the primary-process affective systems are real; the named categories (sadness, fear, anger) are culturally constructed overlays."},{"id":20,"title":"The Evolutionary Mismatch Hypothesis: Implications for Psychological Science","authors":"Li NP, van Vugt M, Colarelli SM","year":2018,"work_type":"review","importance":"pillar","doi":"10.1177/0963721417731378","pmid":null,"phys":false,"summary":null,"why":"Grounds P3 - Li, van Vugt & Colarelli provide the four-step mismatch identification framework and the forced-vs-hijacked mismatch distinction."},{"id":2,"title":"Good Reasons for Bad Feelings: Insights from the Frontier of Evolutionary Psychiatry","authors":"Randolph M. Nesse","year":2019,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA1 - Nesse's systematic treatment of negative emotions as evolved defensive signals rather than disorders, including the Smoke Detector Principle quantitative derivation that also anchors DA5."},{"id":8,"title":"The WEIRDest People in the World: How the West Became Psychologically Peculiar and Particularly Prosperous","authors":"Joseph Henrich","year":2020,"work_type":"book","importance":"pillar","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds P3 - Henrich's documentation that Western populations anchor the extreme end of the cross-cultural distribution on major psychological measures, providing the empirical diagnostic frame for evaluating mismatch: modern WEIRD environments are not the typical human range."},{"id":18,"title":"Fitness Beats Truth in the Evolution of Perception","authors":"Prakash C, Stephens KD, Hoffman DD, Singh M, Fields C","year":2021,"work_type":"paper","importance":"pillar","doi":"10.1007/s10441-020-09400-0","pmid":"33231784","phys":false,"summary":null,"why":"Grounds OF1 - Prakash et al. Fitness-Beats-Truth theorem proves that selection drives veridical perception strategies to extinction as world complexity grows."},{"id":82,"title":"Affectional Responses in the Infant Monkey","authors":"Harlow HF, Zimmermann RR","year":1959,"work_type":"paper","importance":"key","doi":"10.1126/science.130.3373.421","pmid":"13675765","phys":false,"summary":null,"why":"Quantified cloth preference 17-18h/day. Sustained attachment >18 months."},{"id":83,"title":"Total Social Isolation in Monkeys","authors":"Harlow HF, Dodsworth RO, Harlow MK","year":1965,"work_type":"paper","importance":"key","doi":"10.1073/pnas.54.1.90","pmid":"4955132","phys":false,"summary":null,"why":"Isolation devastation: 6mo severely impaired, 12mo obliterated socially. Grounds DA7, M3."},{"id":88,"title":"Infant-Mother Attachment","authors":"Ainsworth MDS","year":1979,"work_type":"paper","importance":"key","doi":"10.1037/0003-066x.34.10.932","pmid":"517843","phys":false,"summary":null,"why":"Attachment as biological ground plan. Sensitivity hypothesis. Secure base. Grounds M3, DA2, DA7."},{"id":89,"title":"Romantic Love Conceptualized as an Attachment Process","authors":"Hazan C, Shaver P","year":1987,"work_type":"paper","importance":"key","doi":"10.1037/0022-3514.52.3.511","pmid":"3572722","phys":false,"summary":null,"why":"Extends A/B/C to adult romantic love. ~56% secure parallels infants. Grounds M3, M14."},{"id":93,"title":"Why Stress Is Bad for Your Brain","authors":"Sapolsky RM","year":1996,"work_type":"paper","importance":"key","doi":"10.1126/science.273.5276.749","pmid":"8701325","phys":false,"summary":null,"why":"Glucocorticoid cascade hypothesis: chronic cortisol→hippocampal damage→positive feedback. Grounds DC1, DA3."},{"id":67,"title":"The Evolution of Social Attractiveness and Its Role in Shame, Humiliation, Guilt, and Therapy","authors":"Gilbert P","year":1997,"work_type":"paper","importance":"key","doi":"10.1111/j.2044-8341.1997.tb01893.x","pmid":null,"phys":false,"summary":null,"why":"Evolutionary model of social rank, shame, and submissive behavior. Grounds M5 by linking status evaluation to evolved threat-detection and appeasement systems."},{"id":103,"title":"The Mating Mind: How Sexual Choice Shaped the Evolution of Human Nature","authors":"Miller, G. F.","year":2000,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":false,"summary":"Argues that many distinctively human cognitive traits (language, art, music, humor, creativity, generosity, moral sense) evolved under sexual selection - as fitness indicators shaped by mate choice - rather than being explained by natural selection for survival alone. Extends the selection pressure shaping the human motivational and cognitive architecture from survival to reproduction-via-mate-choice. Draws on Darwin's original sexual selection framework, Zahavi's handicap principle, and Fisher's runaway model.","why":"Central text for the sexual-selection-shapes-cognition thesis. Broadens the adaptive logic behind P2's \"domain-sensitive interacting adaptations\" beyond survival, and strengthens M14's theoretical foundation by situating human cognitive traits inside mate-choice pressure. Required reading for engaging with Miller on Cor."},{"id":86,"title":"Fears, Phobias, and Preparedness: Toward an Evolved Module of Fear and Fear Learning","authors":"Öhman A, Mineka S","year":2001,"work_type":"paper","importance":"key","doi":"10.1037/0033-295x.108.3.483","pmid":"11488376","phys":false,"summary":null,"why":"Evolved fear module: selectivity, automaticity, encapsulation, dedicated circuitry. Grounds M1, DA5, C8."},{"id":92,"title":"Social Status and Health in Humans and Other Animals","authors":"Sapolsky RM","year":2004,"work_type":"review","importance":"key","doi":"10.1146/annurev.anthro.33.070203.144000","pmid":null,"phys":false,"summary":null,"why":"Review linking primate hierarchy-stress to human SES gradient. Whitehall studies. Psychosocial stress pathway."},{"id":55,"title":"The Status Syndrome: How Social Standing Affects Our Health and Longevity","authors":"Marmot, Michael","year":2004,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M5 Status Monitoring (primary) with secondary links to M6 Controllability/Agency and DA6 Competing Motivational Programs. Marmot's 2004 synthesis of the Whitehall I (1976 onward) and Whitehall II (1985 onward) longitudinal civil-servant cohort studies establishes the 'status syndrome': a gradient of mortality and morbidity that follows occupational grade even within white-collar populations, not reducible to poverty, with autonomy/control and social participation as the operationally identified causal mechanism. Work is tiered 'key' because the book is a synthesis for general audiences; the primary data live in the underlying Whitehall papers, which remain a source gap pending direct extraction. Cor uses this work as the canonical statement of the hierarchy-physiology-to-health pathway."},{"id":105,"title":"Resolving the paradox of common, harmful, heritable mental disorders: Which evolutionary genetic models work best?","authors":"Keller, M. C., & Miller, G. F.","year":2006,"work_type":"paper","importance":"key","doi":"10.1017/s0140525x06009095","pmid":null,"phys":false,"summary":"Behavioral and Brain Sciences target article. Evaluates three candidate evolutionary genetic models for why common harmful mental disorders with high heritability persist in populations despite reducing fitness: ancestral neutrality, balancing selection, and polygenic mutation-selection balance. Argues that polygenic mutation-selection balance - many rare mildly deleterious alleles accumulating in large targets - is the model that best fits the observed heritability, frequency, and fitness-cost pattern, rather than pure adaptive explanations. With extensive BBS open-peer-commentary.","why":"Critical counterweight to pure-adaptationist readings of mental disorder. Directly relevant to DA1's four-category distinction (defensive signal vs. dysregulation vs. damage vs. developmental miscalibration) - Keller & Miller's mutation-selection-balance account maps most cleanly to the \"damage\" / \"dysregulation\" categories and bounds the scope of \"defensive signal under mismatch\" claims. Engagement with this paper is expected for any serious evolutionary-psychiatry interlocutor."},{"id":80,"title":"The neurobiology of positive emotions","authors":"Burgdorf J, Panksepp J","year":2006,"work_type":"review","importance":"key","doi":"10.1016/j.neubiorev.2005.06.001","pmid":"16099508","phys":false,"summary":null,"why":"50-kHz chirps as positive affect index. Appetitive vs consummatory positive affect. Grounds M4, M2."},{"id":27,"title":"The Debate over Dopamine's Role in Reward: The Case for Incentive Salience","authors":"Kent C. Berridge","year":2007,"work_type":"review","importance":"key","doi":"10.1007/s00213-006-0578-x","pmid":null,"phys":true,"summary":null,"why":"Grounds DA4 - Berridge's 2007 restatement of the wanting/liking dissociation with updated human neuroimaging evidence from Parkinson's DDS patients and healthy-volunteer dietary and pharmacological dopamine manipulations. The 1998 Berridge & Robinson original remains a source gap pending direct extraction; the 2007 paper is the current anchor for DA4's incentive-salience claim."},{"id":54,"title":"Loneliness: Human Nature and the Need for Social Connection","authors":"Cacioppo, John T.; Patrick, William","year":2008,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M3 Social Bonding (primary) with secondary links to M1 Threat Management and M10 Movement/Regulatory. Cacioppo & Patrick's 2008 synthesis is the canonical statement of the loneliness-as-evolved-signal research program: perceived social isolation is an aversive signal selected to motivate re-connection, with downstream physiological consequences (hypervigilance, elevated cortisol, dampened ventral-striatum reward response, inflammatory gene-expression changes, elevated total peripheral resistance). Work is tiered 'key' not 'pillar' because it is a synthesis for lay audiences; the underlying primary data live in Cacioppo's Ohio State / Chicago lab papers and in collaborative publications with Hawkley, Cole, and Boomsma."},{"id":104,"title":"Spent: Sex, Evolution, and Consumer Behavior","authors":"Miller, G. F.","year":2009,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":false,"summary":"Applies sexual-selection and signaling theory to consumer behavior. Argues that consumer goods function largely as fitness-indicator proxies - signaling intelligence, conscientiousness, openness, agreeableness, stability, and mate value - rather than delivering the underlying benefits (mate access, status, belonging) that the signaling machinery evolved to obtain. Positions luxury consumption, branded goods, and status markers as industrialized exploitation of mate-choice and status-monitoring mechanisms, anticipating later market-proxy-exploitation framings.","why":"Among the clearest applications of mismatch / proxy-hijack logic to consumer markets. Direct line of sight to DA4 (Proxy Hijacking via Open Loops) and DC2 (Market Proxy Exploitation). Strengthens Cor's consumer / market-exploitation applied layer, which currently rests on Schüll (gambling) and Moss (food). Miller's work fills the branded-goods / status-signaling slot."},{"id":70,"title":"The social brain hypothesis and its implications for social evolution","authors":"Dunbar RIM","year":2009,"work_type":"paper","importance":"key","doi":"10.1080/03014460902960289","pmid":null,"phys":false,"summary":null,"why":"Major review updating social brain hypothesis with 17 years of data. Establishes that pair-bond cognition was generalized to non-reproductive friendships in anthropoid primates. Grounds DA2, P2, M3."},{"id":58,"title":"The Playful Brain: Venturing to the Limits of Neuroscience","authors":"Pellis, Sergio & Pellis, Vivien","year":2009,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Load-bears M4 Social Calibration/Play (primary target, currently 3 rows after Lieberman bump - critical weakness still). Pellis & Pellis are named in M4 source_researchers and The Playful Brain is their synthesis of 25+ years of comparative play research across mammalian taxa, with detailed neurobiological substrate claims (prefrontal cortex, amygdala, somatosensory cortex, opioid/dopamine circuits). This book is the single most important source for grounding M4 at the neurobiological-and-comparative levels. Also supports DA8 Phylogenetic Priority (play across mammals) and M9 Care/Alloparenting (mother-infant play bouts). Work is tiered key because Playful Brain is a 2009 synthesis for general/graduate audiences; the underlying empirical papers (Pellis lab publications) live in the peer-reviewed neuroscience literature and would be pillar-tier if added separately."},{"id":51,"title":"Allostatic load biomarkers of chronic stress and impact on health and cognition","authors":"Juster, Robert-Paul; McEwen, Bruce S.; Lupien, Sonia J.","year":2010,"work_type":"review","importance":"key","doi":"10.1016/j.neubiorev.2009.10.002","pmid":null,"phys":true,"summary":null,"why":"Grounds DC1 and DA3 - Juster, McEwen & Lupien's 2010 review operationalizes allostatic load into a measurable multi-systemic biomarker index (cortisol, catecholamines, DHEA-S, cholesterol, HbA1c, CRP, fibrinogen, blood pressure, waist-to-hip ratio) and reviews dozens of studies linking elevated AL to mortality, cognitive decline, and cardiovascular disease. Complements the 1998 NEJM and 1993 McEwen & Stellar formulations with a matured, empirically-validated version of the allostatic load framework."},{"id":25,"title":"Social Relationships and Mortality Risk: A Meta-analytic Review","authors":"Holt-Lunstad J, Smith TB, Layton JB","year":2010,"work_type":"meta_analysis","importance":"key","doi":"10.1371/journal.pmed.1000316","pmid":"20668659","phys":false,"summary":null,"why":"Empirical landmark for DA2 - Holt-Lunstad et al. 148-study, 308,849-participant meta-analysis: strong social relationships carry a 50% mortality-reduction advantage, comparable to smoking cessation. Downstream evidence rather than a primary architectural claim, hence importance='key' not 'pillar'."},{"id":41,"title":"The Behavioral Immune System (and Why It Matters)","authors":"Mark Schaller, Justin H. Park","year":2011,"work_type":"review","importance":"key","doi":"10.1177/0963721411402596","pmid":null,"phys":false,"summary":null,"why":"Grounds M12 - Schaller & Park's consolidation of the Behavioral Immune System framework: evolved psychological mechanisms detecting pathogen cues and triggering disgust-mediated avoidance on smoke-detector principles."},{"id":72,"title":"Relationships and the social brain: Integrating psychological and evolutionary perspectives","authors":"Sutcliffe A, Dunbar RIM, Binder J, Arrow H","year":2012,"work_type":"paper","importance":"key","doi":"10.1111/j.2044-8295.2011.02061.x","pmid":null,"phys":false,"summary":null,"why":"Validates nested social layers (5/15/50/150) with cost-benefit framework. 40% of social time devoted to innermost 5 people. Trust as proximal mechanism. Grounds M3, DA2."},{"id":62,"title":"Hunter-Gatherer Energetics and Human Obesity","authors":"Pontzer, Herman; Raichlen, David A.; Wood, Brian M.; Mabulla, Audax Z. P.; Racette, Susan B.; Marlowe, Frank W.","year":2012,"work_type":"paper","importance":"key","doi":"10.1371/journal.pone.0040503","pmid":null,"phys":true,"summary":null,"why":"Grounds M13 Energy Regulation with the empirical finding that Hadza hunter-gatherer daily energy expenditure is similar to that of Western sedentary adults despite dramatically greater physical activity. The PLOS ONE paper is the original cross-population result that motivated the later 2016 Constrained TEE model (Pontzer et al. 2016). Together they establish that obesity cannot be explained simply as a physical-activity deficit in industrialized populations: Hadza and Westerners spend similar total calories per day, so the difference must lie primarily in energy intake and food composition."},{"id":39,"title":"Oxytocin and Social Affiliation in Humans","authors":"Ruth Feldman","year":2012,"work_type":"review","importance":"key","doi":"10.1016/j.yhbeh.2012.01.008","pmid":null,"phys":false,"summary":null,"why":"Grounds R1 and M3 - Feldman's synthesis of oxytocin and human affiliation, including parent-infant bonding, romantic pair bonding, and cross-generational transmission of parenting via bio-behavioral synchrony."},{"id":36,"title":"Internal Time: Chronotypes, Social Jet Lag, and Why You're So Tired","authors":"Roenneberg T","year":2012,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Grounds M7 - Roenneberg's chronotype research and the social-jetlag concept: chronic discrepancy between biological and socially-imposed sleep schedules as a pervasive mismatch condition."},{"id":40,"title":"Social Jetlag and Obesity","authors":"Till Roenneberg, Karla V. Allebrandt, Martha Merrow, Celine Vetter","year":2012,"work_type":"paper","importance":"key","doi":"10.1016/j.cub.2012.03.038","pmid":null,"phys":false,"summary":null,"why":"Grounds M7 - Roenneberg et al.'s demonstration of social jetlag affecting 69% of the population and predicting BMI specifically in the overweight subgroup."},{"id":114,"title":"Disgust: Evolved Function and Structure","authors":"Tybur JM, Lieberman D, Kurzban R, DeScioli P","year":2013,"work_type":"review","importance":"key","doi":"10.1037/a0030778","pmid":"23205888","phys":false,"summary":"Canonical evolutionary-computational framework for disgust (Psychological Review, 120(1):65-84). Argues disgust comprises three FUNCTIONALLY DISTINCT adaptations - pathogen, sexual, and moral disgust - each with its own information-processing system, rather than one mechanism extended by co-option. Pathogen disgust avoids infection; sexual disgust avoids fitness-jeopardizing mates; moral disgust is recast as a condemnation-coordination/signaling system (building on DeScioli & Kurzban) that shares with pathogen disgust primarily the facial/vocal EXPRESSION, not the avoidance function. Authors explicitly flag moral disgust as the least settled domain (\"little consensus about the measurement, function, and even existence\") and their treatment of it as \"necessarily more exploratory.\" Full text (version of record) read in full.","why":"Steelman primary for M12's demoted moral-disgust extension (ruling #1583). Adjudicated (full-text read, 4-agent adversarial panel) to support the functionally-distinct / shares-expressive-machinery (WEAK) reading and NOT to earn back the strong \"moral disgust is hijacked pathogen disgust\" claim - the canonical framework itself treats the moral domain as distinct and exploratory, and its one causal-input claim rests on the incidental-disgust priming literature that ext105 (Landy & Goodwin 2015) nulls to d≈0. Confirms the demotion and supplies the authoritative source for M12's three-domain disgust structure."},{"id":34,"title":"Salt Sugar Fat: How the Food Giants Hooked Us","authors":"Moss M","year":2013,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Grounds DC2 and M13 - Moss's documentation of bliss-point engineering and industry knowledge of designed satiety bypass in ultra-processed food."},{"id":85,"title":"Coming to terms with fear","authors":"LeDoux JE","year":2014,"work_type":"paper","importance":"key","doi":"10.1073/pnas.1400335111","pmid":"24501122","phys":false,"summary":null,"why":"Defensive survival circuits vs conscious fear. Relevant to BT1."},{"id":43,"title":"Maternal-preterm skin-to-skin contact enhances child physiologic organization and cognitive control across the first 10 years of life.","authors":"Feldman R, Rosenthal Z, Eidelman AI.","year":2014,"work_type":"paper","importance":"key","doi":null,"pmid":"24094511","phys":false,"summary":null,"why":"Empirical for R1 and ED9 - Feldman et al.'s 10-year longitudinal RCT showing kangaroo care produces durable autonomic, attachment, and cognitive benefits in preterm infants into adolescence."},{"id":48,"title":"Does Incidental Disgust Amplify Moral Judgment? A Meta-Analytic Review of Experimental Evidence","authors":"Landy JF, Goodwin GP","year":2015,"work_type":"meta_analysis","importance":"key","doi":null,"pmid":"26177951","phys":false,"summary":null,"why":"Challenge to incidental-disgust-amplifies-moral-judgment literature - Landy & Goodwin meta-analysis (k=50) finds small raw effect (d=0.11) that largely disappears after publication-bias correction. Imported to discipline M12 framing."},{"id":37,"title":"Evening use of light-emitting eReaders negatively affects sleep, circadian timing, and next-morning alertness","authors":"Chang AM, Aeschbach D, Duffy JF, Czeisler CA","year":2015,"work_type":"paper","importance":"key","doi":"10.1073/pnas.1418490112","pmid":"25535358","phys":false,"summary":null,"why":"Empirical M7 - Chang et al. randomized crossover demonstrating that LE-eBook use before bed produces measurable circadian disruption, melatonin suppression, and next-morning sleepiness."},{"id":123,"title":"Kangaroo mother care to reduce morbidity and mortality in low birthweight infants","authors":"Conde-Agudelo A, Díaz-Rossello JL","year":2016,"work_type":"meta_analysis","importance":"key","doi":"10.1002/14651858.CD002771.pub4","pmid":null,"phys":false,"summary":"Cochrane systematic review and meta-analysis of kangaroo mother care (KMC) versus conventional neonatal care in low-birthweight infants. In stabilized LBW infants, KMC significantly reduced mortality at discharge or 40-41 weeks postmenstrual age (RR 0.60, 95% CI 0.39-0.92; 8 trials, 1736 infants) and at latest follow-up (RR 0.67, 95% CI 0.48-0.95; 12 trials, 2293 infants; moderate-quality evidence), alongside reductions in nosocomial infection, hypothermia, and improved growth and breastfeeding. Trials were predominantly conducted in low- and middle-income settings.","why":"Carries the KMC neonatal-mortality-reduction figure (the ~40% ≈ RR 0.60) that ED9 (Kangaroo Mother Care) asserts and that R1 (C-tactile touch) rests on. Its ingestion makes ED9's mortality claim corpus-grounded and resolves the EEA-TOUCH-01 contradiction (which had noted the figure was not present in the cited corpus). Landmark meta-analytic evidence that skin-to-skin contact is a mortality-level regulatory input, not a comfort measure."},{"id":111,"title":"Exercise as a treatment for depression: A meta-analysis adjusting for publication bias","authors":"Schuch FB, Vancampfort D, Richards J, Rosenbaum S, Ward PB, Stubbs B","year":2016,"work_type":"meta_analysis","importance":"key","doi":"10.1016/j.jpsychires.2016.02.023","pmid":null,"phys":false,"summary":"Meta-analysis: exercise antidepressant effect d~0.8 after publication-bias adjustment; non-inferior to first-line treatment.","why":"Source for ED7 (exercise as depression treatment)."},{"id":73,"title":"Do online social media cut through the constraints that limit the size of offline social networks?","authors":"Dunbar RIM","year":2016,"work_type":"paper","importance":"key","doi":"10.1098/rsos.150292","pmid":null,"phys":false,"summary":null,"why":"First randomized stratified study (N=3375) confirming Dunbar's number holds online. Mean Facebook friends=155.2, support clique=4.1. Social media cannot substitute face-to-face. Directly grounds P3 mismatch case for M3."},{"id":56,"title":"Anatomy of Love: A Natural History of Mating, Marriage, and Why We Stray","authors":"Fisher, Helen","year":2016,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds M14 Reproductive Motivation (primary) - the mechanism for which Fisher is the single most important researcher. Fisher's three-component architecture (lust / romantic love / attachment with distinct neurochemical substrates) is the canonical decomposition of M14 and is the explicit basis for M14's phylogenetic timing (~500Myr sexual reproduction, ~200Myr mammalian pair-bonding). Work is tiered 'key' because the book is a revised 2016 synthesis for general audiences; Fisher's primary fMRI studies (with Lucy Brown, Art Aron, Bianca Acevedo) live in the underlying peer-reviewed papers. Individual passages reporting specific fMRI results or the Swedish AVPR1A gene study are tagged source_type='primary'; framework/synthesis passages are tagged 'propagation'."},{"id":32,"title":"Learned Helplessness at Fifty: Insights from Neuroscience","authors":"Maier SF, Seligman MEP","year":2016,"work_type":"review","importance":"key","doi":"10.1037/rev0000033","pmid":"27337390","phys":false,"summary":null,"why":"Grounds M6 - Maier & Seligman's 2016 inversion: passivity is the default and control is learned via vmPFC-DRN circuit. The founding statement of M6 (Controllability/Agency) mechanism."},{"id":6,"title":"The Handbook of Evolutionary Psychology, Volume 1: Foundations (2nd ed.)","authors":"David M. Buss (editor)","year":2016,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Grounds DA5 and M14 - Buss's consolidated volume covering error management, sexual strategies theory, sex-differentiated mate preferences, and the fear-module program of research. Primary source for M14 (reproductive motivation) architecture."},{"id":110,"title":"A randomised controlled trial of dietary improvement for adults with major depression (the 'SMILES' trial)","authors":"Jacka FN, O'Neil A, Opie R, et al.","year":2017,"work_type":"paper","importance":"key","doi":"10.1186/s12916-017-0791-y","pmid":null,"phys":false,"summary":"SMILES RCT: Mediterranean-style dietary intervention vs social support; 32% vs 8% remission at 12 weeks (NNT~4).","why":"Source for ED6 (SMILES diet & depression)."},{"id":35,"title":"Why We Sleep: Unlocking the Power of Sleep and Dreams","authors":"Walker M","year":2017,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Grounds M7 - Walker's synthesis of sleep neuroscience and the consequences of circadian and sleep disruption across metabolic, immune, emotional, and memory systems."},{"id":59,"title":"The Inflamed Mind: A Radical New Approach to Depression","authors":"Bullmore, Edward","year":2018,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Load-bears M8 Immune Regulation (primary target). Bullmore synthesizes the Dantzer / Raison / Miller / Danese neuroimmunology literature on cytokine sickness behavior, inflammation-as-cause of depression, the failed monoamine paradigm, and the stress->immune->mood cascade. The underlying primary research (Dantzer cytokine experiments, Danese ACE-inflammation longitudinal cohorts, Raison/Miller clinical trials) is tagged propagation because Bullmore is reporting rather than originating. His own first-person psychiatric clinical observations and the broader narrative framing are tagged primary. Load-bearing for M8 plus supporting contributions to M3 Social Bonding (sickness-behavior social withdrawal), M6 Controllability/Agency (sickness behavior as evolved withdrawal), and DC1 Allostatic Load (inflammation as chronic-stress mediator)."},{"id":49,"title":"Association between physical exercise and mental health in 1.2 million individuals in the USA between 2011 and 2015: a cross-sectional study","authors":"Chekroud SR, Gueorguieva R, Zheutlin AB, Paulus M, Krumholz HM, Krystal JH","year":2018,"work_type":"paper","importance":"key","doi":null,"pmid":"30099000","phys":false,"summary":null,"why":"Empirical supporting M10 - Chekroud et al. 1.2M-person cross-sectional study showing exercisers have 43% fewer poor-mental-health days per month than matched non-exercisers, across all exercise types."},{"id":121,"title":"Emotional Expressions Reconsidered: Challenges to Inferring Emotion From Human Facial Movements","authors":"Barrett LF, Adolphs R, Marsella S, Martinez AM, Pollak SD","year":2019,"work_type":"review","importance":"key","doi":"10.1177/1529100619832930","pmid":"31313636","phys":false,"summary":"Peer-reviewed systematic review (Psychological Science in the Public Interest, 20(1):1-68) synthesizing reliability, specificity, generalizability, and validity evidence across facial-movement, autonomic, and neural studies. Concludes there is no consistent, specific physical fingerprint mapping onto emotion categories; variation, not uniformity, is the norm.","why":"Peer-reviewed source for the no-consistent-emotion-fingerprint finding used to support constructed-emotion theory (P2; M1, M2, M3, M5). Re-pointed target for extraction 300, which previously cited the trade book How Emotions Are Made (w11); this review is the canonical peer-reviewed synthesis of the same multi-domain evidence, so the meta_analysis grade now rests on a legitimate review-type source."},{"id":96,"title":"Tinbergen's four questions: Two proximate, two evolutionary","authors":"Nesse RM","year":2019,"work_type":"paper","importance":"key","doi":"10.1093/emph/eoy035","pmid":"30697425","phys":false,"summary":null,"why":"The four-question framework (mechanism, ontogeny, phylogeny, adaptive significance) Cor uses for systematic analysis."},{"id":45,"title":"Screens, Teens, and Psychological Well-Being: Evidence From Three Time-Use-Diary Studies.","authors":"Orben A, Przybylski AK","year":2019,"work_type":"paper","importance":"key","doi":null,"pmid":"30939250","phys":false,"summary":null,"why":"Challenge to strong screen-time-as-mismatch claims - Orben & Przybylski time-use diary findings showing little evidence of substantial negative associations in adolescent well-being. Imported to discipline Cor's DC2/mismatch framing: not all technology is the same, and effect sizes matter."},{"id":46,"title":"A meta-analysis of the association between adolescent social media use and depressive symptoms.","authors":"Ivie EJ, Pettitt A, Moses LJ, Allen NB","year":2020,"work_type":"meta_analysis","importance":"key","doi":null,"pmid":"32734903","phys":false,"summary":null,"why":"Challenge / scope refinement - Ivie et al. meta-analysis showing small-but-significant correlation between adolescent social media use and depressive symptoms with high heterogeneity (I2=95). Cor must treat the effect as real but modest and highly moderated."},{"id":124,"title":"'Dunbar's number' deconstructed","authors":"Lindenfors P, Wartel A, Lind J","year":2021,"work_type":"paper","importance":"key","doi":"10.1098/rsbl.2021.0158","pmid":null,"phys":false,"summary":"Redoes the neocortex-ratio-to-group-size regression that produced 'Dunbar's number' using modern phylogenetic comparative methods (Bayesian and generalized least-squares) on complementary primate datasets. Point estimates of average human group size swing wildly by method (Bayesian 69-109; GLS 16-42) with enormous 95 percent confidence intervals (4-520 and 2-336), so no single number is statistically supportable. Concludes a cognitive limit on human group size cannot be derived this way, and that culture, language and institutions decouple human sociality from a primate brain-size line. Read in full via open access (Biol Lett 17(5):20210158, PMC8103230).","why":"The primary published methodological challenge to Dunbar's ~150. Sits in the challenge layer against the outer Dunbar rung of M3/M11/M5. Most-cited objection to a claim the corpus previously graded replicated; ingesting it converts the most obvious unengaged objection into a demonstration that the challenge layer works. Does NOT touch the nested layer structure or the primate regression data."},{"id":57,"title":"Exercised: The Science of Physical Activity, Rest and Health","authors":"Lieberman, Daniel","year":2021,"work_type":"book","importance":"key","doi":null,"pmid":null,"phys":true,"summary":null,"why":"Load-bears M10 Movement/Regulatory (primary target) - Lieberman is listed in M10 source_researchers and the M10 resolution_conditions wording (movement embedded in daily life rather than set aside as exercise) is essentially paraphrasing this book. Also supports M13 Energy Regulation (via Pontzer TEE synthesis and Hadza energetic data) and DA4 Proxy Hijacking (exercise as discretionary category error vs embedded daily activity). Work is tiered key because Exercised is a 2021 popular-science synthesis for general audiences; Lieberman's primary fieldwork papers (hunter-gatherer activity levels, endurance-running biomechanics, active-grandparent evidence) live in the underlying peer-reviewed literature. Passages reporting Lieberman's own Pemja/Hadza fieldwork or his original theoretical contributions (active grandparent hypothesis) are tagged source_type=primary; passages synthesizing Pontzer, Cooper, Fries, etc. are tagged propagation."},{"id":102,"title":"Digitally Connected, Evolutionarily Wired: An Evolutionary Mismatch Perspective on Digital Work","authors":"van Vugt, M., Colarelli, S. M., & Li, N. P.","year":2024,"work_type":"paper","importance":"key","doi":"10.1177/20413866241232138","pmid":null,"phys":false,"summary":"Applies evolutionary mismatch framework specifically to digital work. Identifies how psychological adaptations for ancestral work (small-group, embodied, skill-based, autonomy-rich) collide with features of digital work (remote, sedentary, always-on, surveillance-heavy). Maps both exacerbating mismatches (chronic stress, screen time, reduced physical activity, weakened social bonds) and potential matches (flexible schedules, broader networks). Proposes organizational interventions grounded in mismatch logic.","why":"Direct application of mismatch thesis to digital/organizational domain - one of the clearest worked examples of how the framework generates testable predictions and practical interventions. Strengthens Cor's applied coverage beyond health/diet/mental-health."},{"id":44,"title":"Darwin's \"Horrid\" Doubt Revisited: A Critical Reassessment of Evolutionary Arguments against Truth","authors":"Maurizio Esposito","year":2025,"work_type":"paper","importance":"key","doi":"10.1007/s10699-025-10018-z","pmid":null,"phys":false,"summary":null,"why":"Philosophical challenge to OF1 - Esposito's reassessment of the Evolutionary Argument Against Truth. Imported to represent the contested-philosophical-challenge axis; Cor's OF1 position survives this challenge but the argument deserves explicit treatment."},{"id":74,"title":"Die organische Chemie in ihrer Anwendung auf Agricultur und Physiologie","authors":"Liebig, Justus von","year":1840,"work_type":"book","importance":"supporting","doi":null,"pmid":null,"phys":false,"summary":null,"why":"Historical precedent for the structural form adopted by DA9 (Non-Substitutability of Mechanism Resolution). Liebig formulated the Law of the Minimum in this work: plant growth is bounded by the scarcest essential nutrient, not the average. Cor adopts the structural form; the agronomy content does not transfer. Note: Carl Sprengel (1828) articulated a similar idea earlier; Liebig is the standard citation that popularized and formalized it."},{"id":109,"title":"The Roseto effect: a 50-year comparison of mortality rates","authors":"Egolf B, Lasker J, Wolf S, Potvin L","year":1992,"work_type":"paper","importance":"supporting","doi":"10.2105/ajph.82.8.1089","pmid":null,"phys":false,"summary":"~50% lower MI mortality during the cohesion era (1935-1985); advantage vanished as cohesion dissolved.","why":"Source for ED4 and ED10 (the Roseto Effect)."},{"id":108,"title":"Cognitive Recovery in Socially Deprived Young Children: The Bucharest Early Intervention Project","authors":"Nelson CA, Zeanah CH, Fox NA, Marshall PJ, Smyke AT, Guthrie D","year":2007,"work_type":"paper","importance":"supporting","doi":"10.1126/science.1143921","pmid":null,"phys":false,"summary":"RCT of foster vs institutional care for Romanian orphans; foster care ~doubles IQ recovery; earlier placement better.","why":"Source for ED3 (Bucharest Early Intervention Project)."},{"id":112,"title":"The Depression Cure: The 6-Step Program to Beat Depression without Drugs","authors":"Ilardi SS","year":2009,"work_type":"book","importance":"supporting","doi":null,"pmid":null,"phys":false,"summary":"Therapeutic Lifestyle Change (TLC): six-lever protocol; reported ~75% response vs ~45% SSRI monotherapy.","why":"Source for ED5 (Ilardi TLC). Book = one input."},{"id":125,"title":"Beauty sleep: experimental study on the perceived health and attractiveness of sleep deprived people","authors":"Axelsson J, Sundelin T, Ingre M, Van Someren EJW, Olsson A, Lekander M","year":2010,"work_type":"paper","importance":"supporting","doi":"10.1136/bmj.c6614","pmid":null,"phys":false,"summary":"Experimental study (n=23 photographed after 8h sleep vs after 31h total wakefulness; 65 raters). Sleep-deprived faces rated less healthy, more tired, less attractive (P\u003c0.001 all).","why":"Primary empirical source for DA1 (sleep quality as a visible phenotypic signal); re-sourced from Walker 2017 (Why We Sleep), whose secondhand summary mischaracterized the protocol."},{"id":107,"title":"How Abnormal Is the Behaviour of Captive, Zoo-Living Chimpanzees?","authors":"Birkett LP, Newton-Fisher NE","year":2011,"work_type":"paper","importance":"supporting","doi":"10.1371/journal.pone.0020101","pmid":null,"phys":false,"summary":"Survey: 100% of captive chimpanzees show >=1 abnormal behaviour vs ~0% in wild populations.","why":"Source for ED2 (captive vs wild chimpanzee abnormality)."},{"id":115,"title":"Social networks and cooperation in hunter-gatherers","authors":"Apicella CL, Marlowe FW, Fowler JH, Christakis NA","year":2012,"work_type":"paper","importance":"supporting","doi":"10.1038/nature10736","pmid":"22281599","phys":false,"summary":"Socio-centric network study of 205 Hadza in 17 camps. Hadza networks show degree assortativity, transitivity, reciprocity, geographic decay, and homophily (incl. on cooperation, to 2 degrees); social distance is as important as genetic relatedness in explaining cooperative assortment. Read in full via NIH author manuscript PMC3340565 / NIHMS340660.","why":"EEA social_structure primary: the forager \"shuffle algorithm\" (homophily + strong reciprocity + kinship-not-the-glue). Grounds EEA-SOC-06 / SOC-04."},{"id":118,"title":"Entrainment of the Human Circadian Clock to the Natural Light-Dark Cycle","authors":"Wright KP Jr, McHill AW, Birks BR, Griffin BR, Rusterholz T, Chinoy ED","year":2013,"work_type":"paper","importance":"supporting","doi":"10.1016/j.cub.2013.06.039","pmid":"23910656","phys":false,"summary":"Within-subject field study (n=8) comparing one week in the modern electrical-lighting/constructed environment vs one week camping under only natural light (summer, Colorado ~40N). After natural light, all melatonin markers were ~2h earlier; the internal biological night synchronized to solar time (melatonin onset near sunset, offset just before wake after sunrise). Sleep duration and efficiency were statistically unchanged -> the shift was in circadian PHASE/TIMING, not amount. Read in full via PMC4020279.","why":"EEA circadian_sensory primary grounding natural-light entrainment (EEA-CIRC-01) and phase-not-duration alignment (EEA-CIRC-02); demonstrates the modern electrical-light phase delay directly."},{"id":113,"title":"Chronotherapeutics for Affective Disorders: A Clinician's Manual for Light and Wake Therapy","authors":"Wirz-Justice A, Benedetti F, Terman M","year":2013,"work_type":"book","importance":"supporting","doi":null,"pmid":null,"phys":false,"summary":"Manual of chronotherapeutic protocols (wake therapy, light, sleep-phase advance); ~60% rapid bipolar-depression response.","why":"Source for ED8 (chronotherapy in depression). Book = one input."},{"id":120,"title":"Night waking among breastfeeding mothers and infants: Conflict, congruence or both?","authors":"McKenna JJ","year":2014,"work_type":"paper","importance":"supporting","doi":"10.1093/emph/eou006","pmid":null,"phys":false,"summary":"Peer-reviewed open-access (CC-BY, Oxford) response to David Haig's target article. Reviews McKenna's mother-infant cosleeping/bedsharing laboratory findings: interconnected, mutually-dependent synchronous arousals and coupled physiology (EEG, breathing, sleep architecture, body temperature) between cosleeping mother and infant. McKenna himself foregrounds the contested nature of the work: he distances from a naive \"return to the Pleistocene\" EEA reading, concedes evolutionary trade-offs, and stresses that bedsharing safety depends on how it is practiced (the live SIDS/safety debate). Read in full via Evolution, Medicine, and Public Health OA PDF (Notre Dame host).","why":"Best verifiable full text for EEA-TOUCH-02 (co-sleeping / nighttime body contact). Grounds the nighttime co-regulation channel HONESTLY as contested evidence (single-author commentary in an active debate; cosleeping is genuinely contested on SIDS grounds)."},{"id":117,"title":"Hunter-Gatherer Inter-Band Interaction Rates: Implications for Cumulative Culture","authors":"Hill KR, Wood BM, Baggio J, Hurtado AM, Boyd RT","year":2014,"work_type":"paper","importance":"supporting","doi":"10.1371/journal.pone.0102806","pmid":"25047714","phys":false,"summary":"Interview-based estimates of inter-band interaction rates among Ache (Paraguay) and Hadza (Tanzania) foragers (1201 same-sex adult dyads). Combining yearly interaction rates with life tables, the authors estimate the number of lifetime interaction partners: Ache/Hadza men observe ~300 men making tools in a lifetime (vs ~20 for male chimpanzees), implying a \"social universe of about a thousand individuals.\" Read in full via PLoS ONE open-access XML (PMC4105570).","why":"EEA social_structure primary that grounds the lifetime-known-individual ceiling (EEA-SOC-02): the ~1000 lifetime social universe and its explicit contrast with the ~150 concurrent \"Dunbar number\"."},{"id":119,"title":"Circadian Entrainment to the Natural Light-Dark Cycle across Seasons and the Weekend","authors":"Stothard ER, McHill AW, Depner CM, Birks BR, Moehlman TM, Ritchie HK, Guzzetti JR, Chinoy ED, LeBourgeois MK, Axelsson J, Wright KP Jr","year":2017,"work_type":"paper","importance":"supporting","doi":"10.1016/j.cub.2016.12.041","pmid":"28162893","phys":false,"summary":"Extends Wright et al. 2013 with winter week-long camping (n=5) and summer weekend camping (n=14). Natural light advanced circadian timing in winter (~2.6h earlier melatonin onset) and on a single weekend (~1.4h earlier) despite no change in sleep timing/duration; the biological night begins near sunset under natural light and is delayed under modern electrical lighting in both seasons. Cites convergent hunter-gatherer field data (Toba/Qom) and Brazilian rubber-tappers. Read in full via PMC5335920.","why":"EEA circadian_sensory convergence primary: independent replication of natural-light entrainment (EEA-CIRC-01) and phase-not-duration alignment across season/weekend (EEA-CIRC-02)."},{"id":116,"title":"Hunter-gatherers maintain assortativity in cooperation despite high levels of residential change and mixing","authors":"Smith KM, Larroucau T, Mabulla IA, Apicella CL","year":2018,"work_type":"paper","importance":"supporting","doi":"10.1016/j.cub.2018.07.064","pmid":"30245106","phys":false,"summary":"Longitudinal Hadza study, 56 camps / 383 individuals / 4 waves over 6 years (2010,2013,2014,2016). Camps dissolve and reconstitute (mean repeated campmates across intervals 12.1%; camps shift every 4-8 weeks) yet cooperative assortment persists; current-campmate mean cooperation is the best predictor of an individual cooperation, not stable types. Read in full via the open-access bioRxiv preprint 313064v1.","why":"EEA social_structure primary: camp turnover and the dissolve/reconstitute structure. Grounds EEA-SOC-05 / SOC-03 / SOC-04."},{"id":63,"title":"Sitting, Squatting, and the Evolutionary Biology of Human Inactivity","authors":"Raichlen, David A.; Pontzer, Herman; Zderic, Theodore W.; Harris, Jacob A.; Mabulla, Audax Z. P.; Hamilton, Marc T.; Wood, Brian M.","year":2020,"work_type":"paper","importance":"supporting","doi":"10.1073/pnas.1911868117","pmid":null,"phys":true,"summary":null,"why":"Grounds M13 and M10 with the finding that hunter-gatherer rest postures (squatting, kneeling) maintain muscle activation in ways that modern chair-based sitting does not. Hadza adults sit for comparable hours per day to industrialized adults, but their rest postures keep leg muscles engaged in a way that generates ongoing metabolic activity. This resolves an apparent paradox - how can hunter-gatherers be the comparison case for both ACTIVE daily movement AND extensive rest - by showing that the rest posture itself differs architecturally. Load-bearing for M13's distinction between pattern-of-movement and total-energy-throughput."},{"id":47,"title":"Social Media Use and Internalizing Symptoms in Clinical and Community Adolescent Samples: A Systematic Review and Meta-Analysis.","authors":"Fassi L, Thomas K, Parry DA, Leyland-Craggs A, Ford TJ, Orben A","year":2024,"work_type":"meta_analysis","importance":"supporting","doi":null,"pmid":"38913335","phys":false,"summary":null,"why":"Challenge / scope refinement - Fassi et al. 2024 largest-to-date meta (143 studies, N=1M+) on social media and adolescent internalizing symptoms. The effect is small but consistent; the clinical relevance depends on moderator structure, not average effect size."},{"id":106,"title":"Cruel companionship: How AI companions exploit loneliness and commodify intimacy","authors":"Muldoon J, Parke JJ","year":2025,"work_type":"paper","importance":"supporting","doi":"10.1177/14614448251395192","pmid":null,"phys":false,"summary":"Critical/theoretical account arguing AI companion products exploit loneliness and commodify intimacy - companion AI as engineered proxy exploitation of M3 (social bonding); anchor for DC2 market proxy exploitation.","why":"DC2 theoretical anchor for companion-AI proxy exploitation of M3; resolves the previously-unlocated 'Muldoon & Park' reference (gap G1). Verified via Crossref 2026-05-29."},{"id":122,"title":"Evolutionary Mismatch, Stress, and Competition: Making Sense of Psychosocial Problems in the Polycrisis Era","authors":"Yong JC, Lim AJ, Tan E, Chan SHM","year":2026,"work_type":"review","importance":"supporting","doi":"10.3390/bs16050650","pmid":"42193530","phys":false,"summary":"Conceptual review (Behavioral Sciences, MDPI, 16(5):650, published 2026-04-26) mapping contemporary problems (allergies, myopia, obesity, chronic anxiety, loneliness, ultralow fertility) to evolved adaptive needs disrupted in highly modernized environments and intensified by the polycrisis. Introduces the authors' \"social evolutionary mismatch and competition hypothesis\": that social features of mismatch (larger populations, fragmented communities, rising socioeconomic inequality, constant exposure to inflated social-status cues) heighten real and perceived competition, predicting obsessive status pursuit, hostility, and social withdrawal. Represents an independent 2026 convergence on the mismatch thesis from an evolutionary-psychology group.","why":"Landscape marker and routing source: an independent 2026 review converging on Cor's core mismatch thesis, used to route to its primary references rather than as an evidence source itself. GUARDRAILS: this is a secondary/review work, so do not extract claims from it as primary evidence (R1/R2/R3); ingest its underlying primary sources directly under v2 standards instead. Its more speculative disorder-as-mismatch claims must not be propagated as SUPPORTS. Its one original theoretical move (the social-mismatch competition hypothesis) is logged as an open candidate-convergence question in the gaps layer (G16), not folded into the locked convergence inventory."}]</script>
