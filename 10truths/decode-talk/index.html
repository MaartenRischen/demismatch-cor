<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Decode Talk · Live — Demismatch</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --oxblood: #3a1218;
  --oxblood-deep: #2a0c11;
  --parchment: #ece0c4;
  --parchment-dark: #ddd0b0;
  --ink: #1a0608;
  --teal: #2d6b6b;
  --teal-bright: #3d8585;
  --gold: #c4962c;
}
body {
  background: var(--oxblood-deep);
  color: var(--parchment);
  font-family: 'Spectral', serif;
  min-height: 100vh;
}

.xsite-nav {
  background: var(--oxblood-deep);
  border-bottom: 1px solid var(--teal);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  padding: 0.5rem clamp(0.9rem, 3vw, 2.5rem);
  flex-wrap: wrap;
}
.xsite-nav-brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--parchment);
  font-weight: 500;
  text-decoration: none;
  transition: color 140ms ease;
}
.xsite-nav-brand:hover { color: var(--teal-bright); }
.xsite-nav-links {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.xsite-nav-links a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--parchment);
  text-decoration: none;
  transition: color 140ms ease;
}
.xsite-nav-links a:hover { color: var(--teal-bright); }
.xsite-nav-links a[aria-current="page"] { color: var(--teal-bright); font-weight: 500; }
.xsite-nav-sep { color: #8a7d5e; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; opacity: 0.7; }

.page {
  width: 1200px;
  max-width: calc(100% - 40px);
  margin: 40px auto;
  background: var(--parchment);
  color: var(--ink);
  padding: 56px 72px 40px;
  border-radius: 14px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
}

.title-block {
  text-align: center;
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 2px solid var(--oxblood);
}
.title-block h1 {
  font-family: 'Spectral', serif;
  font-weight: 400;
  font-size: 72px;
  font-style: italic;
  letter-spacing: -0.03em;
  line-height: 0.95;
  color: var(--oxblood);
  margin-bottom: 18px;
}
.title-block h1 em {
  font-style: normal;
  font-weight: 600;
  color: var(--teal);
}
.title-block .standfirst {
  font-family: 'Spectral', serif;
  font-weight: 300;
  font-size: 18px;
  font-style: italic;
  max-width: 640px;
  margin: 0 auto;
  line-height: 1.5;
  color: #4a1e26;
}
.title-block .status {
  display: inline-block;
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--teal);
  padding: 3px 10px;
  border: 1px solid var(--teal);
  border-radius: 3px;
}

.conversation { min-height: 120px; margin-bottom: 28px; }
.conversation:empty::before {
  content: 'Describe a situation, a pattern, a feeling. The organism is speaking — this reads back what circuit is firing.';
  display: block;
  padding: 40px 20px;
  text-align: center;
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: 17px;
  color: #7a5a60;
  line-height: 1.6;
}

.turn { margin-bottom: 28px; }

.q {
  background: var(--oxblood);
  color: var(--parchment);
  padding: 18px 24px;
  border-radius: 10px;
  margin-left: 15%;
  font-family: 'Spectral', serif;
  font-size: 18px;
  line-height: 1.45;
  box-shadow: 4px 4px 0 var(--gold);
  position: relative;
  white-space: pre-wrap;
}
.q::before {
  content: 'YOU';
  position: absolute;
  top: -22px;
  right: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--gold);
}

.a {
  background: var(--parchment-dark);
  color: var(--ink);
  padding: 22px 28px;
  border: 1px solid var(--oxblood);
  border-radius: 10px;
  margin-top: 26px;
  margin-right: 10%;
  font-family: 'Spectral', serif;
  font-size: 17px;
  line-height: 1.6;
  box-shadow: 6px 6px 0 var(--teal);
  position: relative;
  white-space: pre-wrap;
}
.a::before {
  content: 'DECODE · TALK';
  position: absolute;
  top: -22px;
  left: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--teal);
}
.a.streaming::after {
  content: '▊';
  animation: blink 1s infinite;
  color: var(--teal);
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

.error {
  background: #fce8e8;
  border: 1px solid #8a1a1a;
  color: #5a0e0e;
  padding: 14px 18px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
}

.composer {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  border-top: 2px solid var(--oxblood);
  padding-top: 20px;
}
.composer textarea {
  flex: 1;
  min-height: 80px;
  max-height: 240px;
  resize: vertical;
  padding: 14px 18px;
  border: 1px solid var(--oxblood);
  border-radius: 8px;
  background: #fbf4df;
  color: var(--ink);
  font-family: 'Spectral', serif;
  font-size: 17px;
  line-height: 1.5;
  transition: border-color 140ms ease, box-shadow 140ms ease;
}
.composer textarea:focus {
  outline: none;
  border-color: var(--teal);
  box-shadow: 0 0 0 2px rgba(45, 107, 107, 0.2);
}
.composer button {
  padding: 0 24px;
  background: var(--oxblood);
  color: var(--parchment);
  border: none;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: background 140ms ease;
}
.composer button:hover:not(:disabled) { background: var(--teal); }
.composer button:disabled { opacity: 0.4; cursor: not-allowed; }

.footer {
  border-top: 2px solid var(--oxblood);
  margin-top: 32px;
  padding-top: 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--oxblood);
  flex-wrap: wrap;
  gap: 12px;
}
.footer a { color: inherit; text-decoration: none; transition: color 140ms ease; }
.footer a:hover { color: var(--teal); }

@media (max-width: 900px) {
  .page { padding: 32px 20px 24px; }
  .title-block h1 { font-size: 48px; }
  .q { margin-left: 0; font-size: 16px; }
  .a { margin-right: 0; padding: 18px 20px; font-size: 16px; }
  .composer { flex-direction: column; }
  .composer button { padding: 12px; }
}
</style>
</head>
<body>
<nav class="xsite-nav" aria-label="Demismatch network">
  <a class="xsite-nav-brand" href="https://demismatch.com/">DEMISMATCH</a>
  <ul class="xsite-nav-links">
    <li><a href="https://demismatch.com/">10 Truths</a></li>
    <li aria-hidden="true" class="xsite-nav-sep">·</li>
    <li><a href="https://demismatch.com/vision.html">Vision</a></li>
    <li aria-hidden="true" class="xsite-nav-sep">·</li>
    <li><a href="https://demismatch.com/decode-talk.html">Samples</a></li>
    <li aria-hidden="true" class="xsite-nav-sep">·</li>
    <li><a href="https://cor.demismatch.com/">Spec</a></li>
  </ul>
</nav>

<div class="page">
  <div class="title-block">
    <h1><em>Decode Talk</em></h1>
    <p class="standfirst">Situation in, evolutionary read out. Not a companion. Not advice. The mechanism story behind what you're feeling.</p>
    <span class="status">Live · Opus 4.6</span>
  </div>

  <div class="conversation" id="conversation" aria-live="polite"></div>

  <div id="error-slot"></div>

  <form class="composer" id="composer">
    <textarea id="input" placeholder="Describe the situation…" autofocus></textarea>
    <button type="submit" id="submit">Decode</button>
  </form>

  <div class="footer">
    <a href="/decode-talk.html">← Sample exchanges</a>
    <span>demismatch.com/decode-talk · grounded in Cor v4</span>
  </div>
</div>

<script>
const API_URL = '/api/decode-talk/chat';
const messages = [];

const $conversation = document.getElementById('conversation');
const $input = document.getElementById('input');
const $submit = document.getElementById('submit');
const $form = document.getElementById('composer');
const $errorSlot = document.getElementById('error-slot');

let streaming = false;

$form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (streaming) return;

  const text = $input.value.trim();
  if (!text) return;

  $errorSlot.innerHTML = '';
  messages.push({ role: 'user', content: text });
  renderUser(text);

  $input.value = '';
  $input.focus();

  streaming = true;
  $submit.disabled = true;

  const $turn = appendTurn();
  const $a = createAssistantBubble();
  $a.classList.add('streaming');
  $turn.appendChild($a);
  scroll();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      let detail = res.statusText;
      try { detail = (await res.json()).error?.message || detail; } catch { /* ignore */ }
      throw new Error(`${res.status}: ${detail}`);
    }

    let fullText = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const events = buffer.split('\n\n');
      buffer = events.pop() || '';

      for (const evt of events) {
        const dataLine = evt.split('\n').find(l => l.startsWith('data: '));
        if (!dataLine) continue;
        const payload = dataLine.slice(6).trim();
        if (!payload || payload === '[DONE]') continue;
        try {
          const parsed = JSON.parse(payload);
          const delta = parsed.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            $a.textContent = fullText;
            scroll();
          }
        } catch { /* skip unparseable frame */ }
      }
    }

    $a.classList.remove('streaming');
    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    $a.classList.remove('streaming');
    $a.remove();
    messages.pop();
    showError(err.message || 'Unknown error.');
  } finally {
    streaming = false;
    $submit.disabled = false;
  }
});

function renderUser(text) {
  const turn = appendTurn();
  const q = document.createElement('div');
  q.className = 'q';
  q.textContent = text;
  turn.appendChild(q);
  scroll();
}

function appendTurn() {
  const turn = document.createElement('div');
  turn.className = 'turn';
  $conversation.appendChild(turn);
  return turn;
}

function createAssistantBubble() {
  const a = document.createElement('div');
  a.className = 'a';
  return a;
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = msg;
  $errorSlot.appendChild(div);
  scroll();
}

function scroll() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    $form.requestSubmit();
  }
});
</script>
</body>
</html>
