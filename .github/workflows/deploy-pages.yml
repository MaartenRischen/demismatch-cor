name: Deploy COR Site

on:
  push:
    branches:
      - main
      - master
    # The Cor site (dist/) is built from repo-root files only; 10truths/ is a
    # separate site deployed by mirror-10truths.yml. Skip Cor deploys for
    # 10truths-only pushes so they don't spuriously re-deploy (and flake) here.
    paths-ignore:
      - '10truths/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build publish directory
        run: bash scripts/build-public.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
